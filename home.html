<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d97706">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>入庫カルテ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--brand:#1F4E74;--brand-deep:#143A57;--amber:#E8810C;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--surface2:#F6F8FA}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:#EBEEF2;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink);display:grid;place-items:center;padding:20px}
  .card{background:#fff;width:100%;max-width:420px;border-radius:18px;box-shadow:0 12px 40px rgba(20,32,40,.12);padding:28px 26px;text-align:center}
  .logo{width:36px;height:36px;border-radius:9px;background:var(--amber);display:inline-grid;place-items:center;font-weight:800;color:#1b1b1b;margin-bottom:10px}
  h1{font-size:1.1rem;margin:0 0 6px}.sub{color:var(--muted);font-size:.88rem;line-height:1.7}
  button{margin-top:16px;background:#fff;border:1px solid var(--line);color:var(--brand);padding:10px 18px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <img src="/img/logo-mark.png" alt="入庫カルテ" style="height:40px;width:auto;display:block;background:none;padding:0">
  <div id="body"><div class="sub">読み込み中…</div></div>
</div>
<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  var ROLES={site_admin:'運営管理者',shop_admin:'店舗管理者',staff:'スタッフ'};
  (async function(){
    var s=await sb.auth.getSession();
    if(!s.data||!s.data.session){location.replace('login.html');return;}
    var uid=s.data.session.user.id;
    var p=await sb.from('profiles').select('role,name,shop_id').eq('id',uid).single();
    var role=(p.data&&p.data.role)||'staff';
    var shopId=p.data&&p.data.shop_id;
    if(role==='site_admin'){location.replace('siteadmin.html');return;}
    if(role==='shop_admin'){location.replace('shopadmin.html');return;}
    if(role==='staff'&&shopId){location.replace('uketsuke.html');return;}
    // 店舗未所属 → 自動セットアップ（VIP30日の店舗作成）を試みる
    try{
      var token=s.data.session.access_token;
      var setup=await fetch('/api/setup-shop',{method:'POST',headers:{Authorization:'Bearer '+token}});
      var sd=await setup.json().catch(function(){return {};});
      if(setup.ok&&sd.ok&&sd.shopId){location.replace('shopadmin.html');return;}
    }catch(e){}
    // それでも未所属（登録情報が無い等）の場合
    var label=ROLES[role]||role;
    document.getElementById('body').innerHTML=
      '<h1>ログイン中：'+label+'</h1>'+
      '<div class="sub">この方はまだ店舗に所属していません。新規のご登録は <a href="signup.html">こちら</a> から、または店舗管理者にスタッフ登録を依頼してください。</div>'+
      '<button id="out">ログアウト</button>';
    document.getElementById('out').onclick=function(){sb.auth.signOut().then(function(){location.replace('login.html');});};
  })();
</script>
</body>
</html>
