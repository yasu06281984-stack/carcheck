<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d97706">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>新規登録 — 入庫カルテ</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--brand:#1F4E74;--brand-deep:#143A57;--amber:#E8810C;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--red:#C8443B;--green:#2E9E6B}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand-deep),var(--brand));font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink);padding:20px}
  .card{background:#fff;width:100%;max-width:380px;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:30px 26px}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--amber);display:grid;place-items:center;font-weight:800;color:#1b1b1b}
  .brand b{font-size:1.1rem;letter-spacing:.08em}
  h1{text-align:center;font-size:1.15rem;margin:6px 0 6px;color:var(--brand)}
  .lead{text-align:center;font-size:.8rem;color:var(--muted);margin-bottom:18px;line-height:1.6}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .f input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit}
  .f input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,78,116,.12)}
  .cf-turnstile{margin:6px 0 16px;display:flex;justify-content:center;min-height:65px}
  button{width:100%;background:var(--brand);color:#fff;border:0;padding:13px;border-radius:11px;font-size:1rem;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:12px;font-size:.85rem;text-align:center;min-height:1.2em}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}
  .note{margin-top:16px;font-size:.72rem;color:var(--muted);text-align:center}
  .note a{color:var(--brand)}
  .agree{display:flex;gap:8px;align-items:flex-start;font-size:.8rem;color:var(--muted);margin:2px 0 16px;line-height:1.5}
  .agree input{margin-top:2px;width:16px;height:16px;flex:0 0 auto}
  .agree a{color:var(--brand)}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><a href="/" style="display:inline-flex;align-items:center;line-height:0"><img src="/img/logo-mark-b.png" alt="入庫カルテ" style="height:70px;width:auto;display:block;background:none;padding:0"></a></div>
  <h1>新規登録</h1>
  <div id="formArea">
  <div class="lead">必要事項を入力して登録してください。確認メールのリンクを開くと、すぐに<b>VIPプラン（30日間無料）</b>でご利用いただけます。</div>
  <div class="f"><label for="company">会社名・店舗名</label><input id="company" type="text" placeholder="○○自動車"></div>
  <div class="f"><label for="owner">代表者名</label><input id="owner" type="text" placeholder="山田 太郎"></div>
  <div class="f"><label for="tel">電話番号</label><input id="tel" type="tel" placeholder="03-1234-5678" autocomplete="tel"></div>
  <div class="f"><label for="zip">郵便番号（ハイフンなし7桁）</label><input id="zip" type="text" inputmode="numeric" maxlength="8" placeholder="1810004" autocomplete="postal-code"><div style="font-size:.72rem;color:var(--muted);margin-top:4px">郵便番号を入れると住所が途中まで自動で入ります。続きはご入力ください。</div></div>
  <div class="f"><label for="address">住所</label><input id="address" type="text" placeholder="東京都〇〇区〇〇1-2-3"></div>
  <div class="f"><label for="email">メールアドレス（ログインに使います）</label><input id="email" type="email" autocomplete="username"></div>
  <div class="f"><label for="pw">パスワード（8文字以上）</label><input id="pw" type="password" autocomplete="new-password"></div>
  <div class="cf-turnstile" data-sitekey="0x4AAAAAADoIX0U2L82sEhxt" data-callback="onTok"></div>
  <label class="agree"><input type="checkbox" id="agree"><span><a href="terms.html" target="_blank" rel="noopener">利用規約</a>と<a href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>に同意します</span></label>
  <button id="go">登録する</button>
  </div>
  <div id="msg" class="msg"></div>
  <div id="sentPanel" hidden style="text-align:center;padding:6px 0">
    <div style="font-weight:700;color:var(--brand);font-size:1.05rem;margin-bottom:10px">確認メールを送信しました</div>
    <div style="font-size:.86rem;color:var(--muted);line-height:1.8"><b id="sentTo" style="color:var(--ink)"></b> 宛にメールをお送りしました。<br>メール内のリンクを押すと登録が完了し、そのままログインできます。<br><br>※ 数分待っても届かない場合は、迷惑メールフォルダもご確認ください。</div>
  </div>
  <div class="note">すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></div>
</div>
<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  var tok='';window.onTok=function(t){tok=t;};
  var msg=document.getElementById('msg');
  // 郵便番号 → 住所 自動補完（zipcloud・キー不要）
  (function(){
    var zip=document.getElementById('zip');
    function lookup(){
      var z=(zip.value||'').replace(/[^0-9]/g,'');
      if(z.length!==7)return;
      fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+z)
        .then(function(r){return r.json();})
        .then(function(d){
          if(d&&d.status===200&&d.results&&d.results[0]){
            var a=d.results[0];
            var base=(a.address1||'')+(a.address2||'')+(a.address3||'');
            var cur=document.getElementById('address');
            if(!cur.value.trim()){ cur.value=base; cur.focus(); }  // 空のときだけ補完
          }
        }).catch(function(){});
    }
    zip.addEventListener('blur',lookup);
    zip.addEventListener('input',function(){ if((zip.value||'').replace(/[^0-9]/g,'').length===7)lookup(); });
  })();
  document.getElementById('go').addEventListener('click',async function(){
    msg.textContent='';msg.className='msg';
    var company=document.getElementById('company').value.trim();
    var owner=document.getElementById('owner').value.trim();
    var tel=document.getElementById('tel').value.trim();
    var address=document.getElementById('address').value.trim();
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('pw').value;
    if(!company||!owner||!tel||!address){msg.textContent='会社名・代表者名・電話番号・住所をすべて入力してください。';msg.className='msg err';return;}
    if(!email||password.length<8){msg.textContent='メールと8文字以上のパスワードを入力してください。';msg.className='msg err';return;}
    if(!document.getElementById('agree').checked){msg.textContent='利用規約とプライバシーポリシーへの同意が必要です。';msg.className='msg err';return;}
    this.disabled=true;this.textContent='登録中…';
    var opts={emailRedirectTo:'https://nyukokarte.com/login.html',data:{company:company,owner:owner,tel:tel,address:address}};if(tok)opts.captchaToken=tok;
    var res=await sb.auth.signUp({email:email,password:password,options:opts});
    if(res.error){
      msg.textContent='登録できませんでした：'+res.error.message;msg.className='msg err';
      this.disabled=false;this.textContent='登録する';
      if(window.turnstile)try{turnstile.reset();}catch(e){}tok='';return;
    }
    if(res.data&&res.data.session){location.replace('home.html');return;}
    // メール確認が必要な設定：送信完了パネルへ切替
    document.getElementById('formArea').hidden=true;
    document.getElementById('sentTo').textContent=email;
    document.getElementById('sentPanel').hidden=false;
    msg.textContent='';msg.className='msg';
  });
</script>
</body>
</html>
