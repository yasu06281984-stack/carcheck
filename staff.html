<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d97706">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>スタッフログイン — 入庫カルテ</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--brand:#1F4E74;--brand-deep:#143A57;--amber:#E8810C;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--red:#C8443B}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand-deep),var(--brand));font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink);padding:20px}
  .card{background:#fff;width:100%;max-width:380px;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:30px 26px}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--amber);display:grid;place-items:center;font-weight:800;color:#1b1b1b}
  .brand b{font-size:1.1rem;letter-spacing:.08em}
  h1{text-align:center;font-size:1.15rem;margin:6px 0 4px;color:var(--brand)}
  .lead{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:18px;line-height:1.6}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .f input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit}
  .f input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,78,116,.12)}
  .cf-turnstile{margin:6px 0 16px;display:flex;justify-content:center;min-height:65px}
  button{width:100%;background:var(--brand);color:#fff;border:0;padding:13px;border-radius:11px;font-size:1rem;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:12px;font-size:.85rem;text-align:center;min-height:1.2em}.msg.err{color:var(--red)}
  .note{margin-top:16px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.6}
  .note a{color:var(--brand)}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="logo">入</span><b>入庫カルテ</b></div>
  <h1>スタッフ ログイン</h1>
  <div class="lead">店舗から伝えられた「店舗コード・お名前・パスワード」でログインしてください。</div>
  <div class="f"><label for="code">店舗コード</label><input id="code" type="text" autocapitalize="characters" placeholder="例）AB3K7M"></div>
  <div class="f"><label for="name">お名前</label><input id="name" type="text" placeholder="例）山田太郎"></div>
  <div class="f"><label for="pw">パスワード</label><input id="pw" type="password" inputmode="numeric" autocomplete="current-password"></div>
  <div class="cf-turnstile" data-sitekey="0x4AAAAAADoIX0U2L82sEhxt" data-callback="onTok"></div>
  <button id="go">ログイン</button>
  <div id="msg" class="msg"></div>
  <div class="note">店舗管理者の方は <a href="login.html">こちら</a> からログインしてください。</div>
</div>
<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  var tok='';window.onTok=function(t){tok=t;};
  sb.auth.getSession().then(function(r){if(r.data&&r.data.session)location.replace('home.html');});
  var msg=document.getElementById('msg');
  document.getElementById('go').addEventListener('click',async function(){
    msg.textContent='';msg.className='msg';
    var code=document.getElementById('code').value.trim();
    var name=document.getElementById('name').value.trim();
    var password=document.getElementById('pw').value;
    if(!code||!name||!password){msg.textContent='店舗コード・お名前・パスワードを入力してください。';msg.className='msg err';return;}
    this.disabled=true;this.textContent='確認中…';
    try{
      var rr=await fetch('/api/staff-login-resolve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code:code,name:name})});
      var rd=await rr.json().catch(function(){return {};});
      if(!rr.ok||!rd.ok||!rd.email){
        msg.textContent='店舗コードまたはお名前が見つかりません。入力をご確認ください。';msg.className='msg err';
        this.disabled=false;this.textContent='ログイン';return;
      }
      var opts=tok?{captchaToken:tok}:{};
      var res=await sb.auth.signInWithPassword({email:rd.email,password:password,options:opts});
      if(res.error){
        msg.textContent='パスワードが違うか、ログインできませんでした。';msg.className='msg err';
        this.disabled=false;this.textContent='ログイン';
        if(window.turnstile)try{turnstile.reset();}catch(e){}tok='';return;
      }
      location.replace('uketsuke.html');
    }catch(e){
      msg.textContent='通信エラーが発生しました。時間をおいてお試しください。';msg.className='msg err';
      this.disabled=false;this.textContent='ログイン';
    }
  });
</script>
</body>
</html>
