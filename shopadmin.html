<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>店舗管理 — CARCHECK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--paper:#EBEEF2;--surface:#fff;--surface2:#F6F8FA;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--brand:#1F4E74;--brand-deep:#143A57;--brand-soft:#E7EEF5;--amber:#E8810C;--green:#2E9E6B;--green-soft:#E2F2EA;--red:#C8443B}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink)}
  .topbar{background:var(--brand-deep);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--amber);display:grid;place-items:center;font-weight:800;color:#1b1b1b}
  .brand b{letter-spacing:.06em}.brand small{display:block;font-size:.62rem;letter-spacing:.18em;color:#9fb6cc}
  .who{font-size:.82rem;color:#cdd9e6;display:flex;align-items:center;gap:12px}
  .who button{background:rgba(255,255,255,.12);color:#fff;border:0;padding:7px 13px;border-radius:8px;font-size:.8rem;cursor:pointer}
  .wrap{max-width:820px;margin:0 auto;padding:22px 20px 60px}
  .subtabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
  .subtabs button{border:0;background:none;padding:10px 14px;font-size:.9rem;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer}
  .subtabs button.on{color:var(--brand);border-bottom-color:var(--brand)}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:0 1px 2px rgba(20,32,40,.05);margin-bottom:14px}
  .card-l{font-size:.7rem;letter-spacing:.12em;font-weight:700;color:var(--muted);margin-bottom:12px}
  table{width:100%;border-collapse:collapse;font-size:.9rem}
  th{text-align:left;font-size:.68rem;letter-spacing:.06em;color:var(--muted);font-weight:700;padding:7px 8px;border-bottom:1px solid var(--line)}
  td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:0}
  .ava2{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;display:inline-grid;place-items:center;font-size:.66rem;font-weight:700}
  .sp{font-size:.64rem;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--brand-soft);color:var(--brand)}
  .sp.staff{background:var(--surface2);color:var(--muted)}
  .form{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .form-col{display:flex;flex-direction:column;gap:12px}
  .field label{display:block;font-size:.74rem;color:var(--muted);font-weight:600;margin-bottom:4px}
  .field input{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:.95rem;font-family:inherit;background:#fff}
  .primary{background:var(--brand);color:#fff;border:0;padding:11px 22px;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;margin-top:14px}
  .primary:disabled{opacity:.6}
  .lnk{border:0;background:none;color:var(--red);font-size:.82rem;font-weight:600;cursor:pointer}
  .ops{text-align:right;white-space:nowrap}
  .msg{font-size:.84rem;margin-top:10px;min-height:1em}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}
  .small{font-size:.76rem;color:var(--muted)}
  .add{display:flex;gap:10px}.add input{flex:1}
  .hours{display:flex;flex-direction:column;gap:8px}
  .hrow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .hlbl{width:42px;font-size:.85rem;color:var(--muted);font-weight:700}
  .hrow input[type=time]{padding:8px;border:1px solid var(--line);border-radius:8px;font-family:inherit;font-size:.9rem}
  .hrow input:disabled{background:var(--surface2);color:#aaa}
  .cl{display:flex;align-items:center;gap:5px;font-size:.82rem;color:var(--muted)}
  .hprev{font-size:.8rem;color:var(--brand);font-weight:600;background:var(--brand-soft);border-radius:8px;padding:7px 10px;margin-top:8px}
  .eqrow{display:flex;gap:16px;flex-wrap:wrap;margin-top:6px}
  .palette{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .views{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .vtile{border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff}
  .vlbl{font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:4px;text-align:center}
  .vwrap{position:relative;width:100%;cursor:crosshair;touch-action:manipulation}
  .vwrap img{width:100%;display:block;pointer-events:none;-webkit-user-drag:none}
  .mk{position:absolute;width:19px;height:19px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.35);display:grid;place-items:center;font-size:.6rem;color:#fff;font-weight:700;cursor:pointer}
  .hide{display:none!important}
  @media(max-width:680px){.form{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">C</span><div><b>CARCHECK</b><small>店舗管理</small></div></div>
  <div class="who"><span id="whoName"></span><button id="out">ログアウト</button></div>
</div>
<div class="wrap">
  <div class="subtabs" id="tabs">
    <button class="on" data-t="shop">店舗情報</button>
    <button data-t="staff">スタッフ</button>
    <button data-t="vendor">業者名</button>
    <button data-t="outsrc">外注先</button>
    <button data-t="loan">代車登録</button>
  </div>

  <div data-c="shop">
    <div class="card">
      <div class="card-l">店舗情報（受付シートのPDFヘッダーに表示されます）</div>
      <div class="form-col">
        <div class="field"><label>店舗名</label><input id="sh_name"></div>
        <div class="field"><label>会社名</label><input id="sh_company"></div>
        <div class="field"><label>郵便番号</label><div class="add"><input id="sh_postal" placeholder="1000001" inputmode="numeric"><button class="primary" id="sh_zip" style="margin-top:0;white-space:nowrap">住所を自動入力</button></div></div>
        <div class="field"><label>住所（番地・建物は追記してください）</label><input id="sh_address"></div>
        <div class="field"><label>電話番号</label><input id="sh_tel"></div>
        <div class="field"><label>営業時間</label>
          <div class="hours">
            <div class="hrow"><span class="hlbl">平日</span><input type="time" id="h_wd_o"> 〜 <input type="time" id="h_wd_c"></div>
            <div class="hrow"><span class="hlbl">土曜</span><label class="cl"><input type="checkbox" id="h_sat_x">定休</label><input type="time" id="h_sat_o"> 〜 <input type="time" id="h_sat_c"></div>
            <div class="hrow"><span class="hlbl">日曜</span><label class="cl"><input type="checkbox" id="h_sun_x">定休</label><input type="time" id="h_sun_o"> 〜 <input type="time" id="h_sun_c"></div>
            <div class="hrow"><span class="hlbl">祝日</span><label class="cl"><input type="checkbox" id="h_hol_x">定休</label><input type="time" id="h_hol_o"> 〜 <input type="time" id="h_hol_c"></div>
          </div>
          <div class="hprev" id="h_prev">—</div>
        </div>
        <div class="field"><label>ホームページURL</label><input id="sh_url"></div>
      </div>
      <button class="primary" id="sh_save">保存</button>
      <div class="msg" id="sh_msg"></div>
    </div>
  </div>

  <div data-c="staff" class="hide">
    <div class="card"><div class="card-l">スタッフ一覧</div><div id="staffList" class="small">読み込み中…</div></div>
    <div class="card">
      <div class="card-l">スタッフを招待</div>
      <div class="form">
        <div class="field"><label>姓</label><input id="st_sei" placeholder="田中"></div>
        <div class="field"><label>名</label><input id="st_mei" placeholder="健"></div>
        <div class="field" style="grid-column:1/-1"><label>メールアドレス</label><input id="st_email" type="email" placeholder="staff@example.com"></div>
      </div>
      <button class="primary" id="st_invite">招待を登録</button>
      <div class="msg" id="st_msg"></div>
      <div class="small" style="margin-top:6px">登録後、この方が新規登録ページ（/signup.html）でこのメールで登録すると、この店舗のスタッフになります。バッジは「姓1＋名1」で表示されます。</div>
    </div>
    <div class="card"><div class="card-l">招待中（未登録）</div><div id="stInviteList" class="small">読み込み中…</div></div>
  </div>

  <div data-c="vendor" class="hide">
    <div class="card"><div class="card-l">業者一覧</div><div id="vendorList" class="small">読み込み中…</div></div>
    <div class="card"><div class="card-l">業者を追加</div><div class="add"><input id="v_name" placeholder="○○モータース"><button class="primary" id="v_add" style="margin-top:0">追加</button></div><div class="msg" id="v_msg"></div></div>
  </div>

  <div data-c="outsrc" class="hide">
    <div class="card"><div class="card-l">外注先一覧</div><div id="outList" class="small">読み込み中…</div></div>
    <div class="card"><div class="card-l">外注先を追加</div><div class="add"><input id="o_name" placeholder="△△塗装"><button class="primary" id="o_add" style="margin-top:0">追加</button></div><div class="msg" id="o_msg"></div></div>
  </div>

  <div data-c="loan" class="hide">
    <div class="card">
      <div class="card-l">代車を登録</div>
      <div class="form">
        <div class="field"><label>車名</label><input id="lc_car" placeholder="例：N-BOX"></div>
        <div class="field"><label>ナンバー</label><input id="lc_number" placeholder="品川 580 あ 12-34"></div>
        <div class="field"><label>車検期限</label><input id="lc_shaken" type="date"></div>
        <div class="field"><label>車種（イラスト）</label><select id="lc_fig"></select></div>
        <div class="field"><label>保険対象年齢</label><select id="lc_age"></select></div>
        <div class="field"><label>ガソリン種別</label><select id="lc_fuel"></select></div>
      </div>
      <div style="margin-top:12px">
        <label style="font-size:.74rem;color:var(--muted);font-weight:600">装備</label>
        <div class="eqrow">
          <label class="cl"><input type="checkbox" id="lc_nav">カーナビ</label>
          <label class="cl"><input type="checkbox" id="lc_etc">ETC</label>
          <label class="cl"><input type="radio" name="lc_smk" id="lc_smk_no">禁煙車</label>
          <label class="cl"><input type="radio" name="lc_smk" id="lc_smk_ok">喫煙可</label>
        </div>
      </div>
      <div style="margin-top:16px">
        <div class="card-l" style="margin-bottom:8px">傷の登録（種類を選び、イラストをタップして印を付けます／印をタップで取消）</div>
        <div class="palette" id="lc_palette"></div>
        <div class="views" id="lc_views"></div>
        <div style="margin-top:8px"><button class="lnk" id="lc_clear">傷を全てクリア</button></div>
      </div>
      <button class="primary" id="lc_save">保存</button>
      <button class="primary" id="lc_reset" style="background:#7a8794;margin-left:8px">新規（クリア）</button>
      <div class="msg" id="lc_msg"></div>
    </div>
    <div class="card"><div class="card-l">登録済みの代車</div><div id="lc_list" class="small">読み込み中…</div></div>
  </div>
</div>

<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function badge(name){if(!name)return '—';var n=name.trim();if(/\s/.test(n)){var p=n.split(/\s+/);return (p[0]||'').slice(0,1)+(p[1]||'').slice(0,1);}return n.slice(0,2);}
  function setVal(id,v){var e=document.getElementById(id);if(e)e.value=(v==null?'':v);}
  function val(id){var e=document.getElementById(id);return e?String(e.value).trim():'';}
  var SHOP=null;

  document.querySelectorAll('#tabs button').forEach(function(b){b.onclick=function(){
    document.querySelectorAll('#tabs button').forEach(function(x){x.classList.remove('on');});b.classList.add('on');
    var t=b.getAttribute('data-t');
    document.querySelectorAll('[data-c]').forEach(function(c){c.classList.toggle('hide',c.getAttribute('data-c')!==t);});
  };});
  document.getElementById('out').onclick=function(){sb.auth.signOut().then(function(){location.replace('login.html');});};

  // ---- 営業時間 ----
  function hhmm(t){return t?t.replace(/^0/,''):t;}
  function getHours(){
    function g(k){return {o:val('h_'+k+'_o'),c:val('h_'+k+'_c'),x:document.getElementById('h_'+k+'_x').checked};}
    return {wd:{o:val('h_wd_o'),c:val('h_wd_c')},sat:g('sat'),sun:g('sun'),hol:g('hol')};
  }
  function buildHoursText(d){
    var p=[];if(d.wd.o&&d.wd.c)p.push('平日 '+hhmm(d.wd.o)+'〜'+hhmm(d.wd.c));
    [['土',d.sat],['日',d.sun],['祝',d.hol]].forEach(function(e){var x=e[1];if(x.x)p.push(e[0]+' 定休');else if(x.o&&x.c)p.push(e[0]+' '+hhmm(x.o)+'〜'+hhmm(x.c));});
    return p.join(' / ');
  }
  function syncDisabled(){['sat','sun','hol'].forEach(function(k){var c=document.getElementById('h_'+k+'_x').checked;document.getElementById('h_'+k+'_o').disabled=c;document.getElementById('h_'+k+'_c').disabled=c;});}
  function updatePrev(){var t=buildHoursText(getHours());document.getElementById('h_prev').textContent=t||'—';}
  function setHours(d){if(d){setVal('h_wd_o',d.wd&&d.wd.o);setVal('h_wd_c',d.wd&&d.wd.c);
    ['sat','sun','hol'].forEach(function(k){var x=d[k]||{};setVal('h_'+k+'_o',x.o);setVal('h_'+k+'_c',x.c);document.getElementById('h_'+k+'_x').checked=!!x.x;});}
    syncDisabled();updatePrev();}
  document.querySelectorAll('.hours input').forEach(function(i){i.addEventListener('change',function(){syncDisabled();updatePrev();});});

  // ---- 郵便番号→住所 ----
  document.getElementById('sh_zip').onclick=async function(){
    var msg=document.getElementById('sh_msg');msg.textContent='';msg.className='msg';
    var z=val('sh_postal').replace(/[^0-9]/g,'');
    if(z.length!==7){msg.textContent='郵便番号は7桁の数字で入力してください。';msg.className='msg err';return;}
    this.disabled=true;this.textContent='検索中…';
    try{
      var r=await fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+z);
      var j=await r.json();
      if(j.results&&j.results[0]){var a=j.results[0];setVal('sh_address',(a.address1||'')+(a.address2||'')+(a.address3||''));msg.textContent='住所を入力しました。番地・建物を追記してください。';msg.className='msg ok';}
      else{msg.textContent='該当する住所が見つかりませんでした。手入力してください。';msg.className='msg err';}
    }catch(e){msg.textContent='住所の自動取得に失敗しました。手入力してください。';msg.className='msg err';}
    this.disabled=false;this.textContent='住所を自動入力';
  };

  async function loadShop(){
    var r=await sb.from('shops').select('*').eq('id',SHOP).single();
    if(r.error||!r.data)return;var s=r.data;
    setVal('sh_name',s.name);setVal('sh_company',s.company);setVal('sh_postal',s.postal);setVal('sh_address',s.address);
    setVal('sh_tel',s.tel);setVal('sh_url',s.url);setHours(s.hours_data);
  }
  document.getElementById('sh_save').onclick=async function(){
    var msg=document.getElementById('sh_msg');msg.textContent='';msg.className='msg';
    this.disabled=true;this.textContent='保存中…';
    var hd=getHours();
    var r=await sb.from('shops').update({name:val('sh_name'),company:val('sh_company'),postal:val('sh_postal'),address:val('sh_address'),tel:val('sh_tel'),url:val('sh_url'),hours:buildHoursText(hd),hours_data:hd}).eq('id',SHOP);
    this.disabled=false;this.textContent='保存';
    if(r.error){msg.textContent='保存できませんでした：'+r.error.message;msg.className='msg err';return;}
    msg.textContent='保存しました。';msg.className='msg ok';
  };

  async function loadStaff(){
    var r=await sb.from('profiles').select('name,email,role').eq('shop_id',SHOP);
    if(r.error){document.getElementById('staffList').innerHTML='<span style="color:#C8443B">'+esc(r.error.message)+'</span>';return;}
    var rows=(r.data||[]).sort(function(a,b){return (a.role==='shop_admin'?0:1)-(b.role==='shop_admin'?0:1);});
    if(!rows.length){document.getElementById('staffList').innerHTML='まだスタッフがいません。';return;}
    var h='<table><thead><tr><th>バッジ</th><th>氏名</th><th>メール</th><th>役割</th></tr></thead><tbody>';
    rows.forEach(function(p){h+='<tr><td><span class="ava2">'+esc(badge(p.name))+'</span></td><td>'+esc(p.name||'（未設定）')+'</td>'+
      '<td class="small">'+esc(p.email||'')+'</td><td><span class="sp '+(p.role==='staff'?'staff':'')+'">'+(p.role==='shop_admin'?'店舗管理者':'スタッフ')+'</span></td></tr>';});
    document.getElementById('staffList').innerHTML=h+'</tbody></table>';
  }
  async function loadStInvites(){
    var r=await sb.from('invites').select('email,name').eq('shop_id',SHOP).eq('role','staff');
    if(r.error){document.getElementById('stInviteList').innerHTML='<span style="color:#C8443B">'+esc(r.error.message)+'</span>';return;}
    var rows=r.data||[];if(!rows.length){document.getElementById('stInviteList').innerHTML='招待中のものはありません。';return;}
    var h='<table><tbody>';rows.forEach(function(v){h+='<tr><td>'+esc(v.name||'')+'</td><td class="small">'+esc(v.email)+'</td><td class="ops"><button class="lnk" data-del="'+esc(v.email)+'">取消</button></td></tr>';});
    document.getElementById('stInviteList').innerHTML=h+'</tbody></table>';
    document.querySelectorAll('#stInviteList [data-del]').forEach(function(b){b.onclick=async function(){await sb.from('invites').delete().eq('email',b.getAttribute('data-del'));loadStInvites();};});
  }
  document.getElementById('st_invite').onclick=async function(){
    var msg=document.getElementById('st_msg');msg.textContent='';msg.className='msg';
    var email=val('st_email');if(!email){msg.textContent='メールアドレスを入力してください。';msg.className='msg err';return;}
    var nm=(val('st_sei')+' '+val('st_mei')).trim();
    this.disabled=true;this.textContent='登録中…';
    var r=await sb.from('invites').upsert({email:email,name:nm||null,role:'staff',shop_id:SHOP});
    this.disabled=false;this.textContent='招待を登録';
    if(r.error){msg.textContent='登録できませんでした：'+r.error.message;msg.className='msg err';return;}
    msg.textContent='招待を登録しました。';msg.className='msg ok';setVal('st_email','');setVal('st_sei','');setVal('st_mei','');loadStInvites();
  };

  function listMaster(table,listId){
    return sb.from(table).select('id,name').eq('shop_id',SHOP).order('created_at').then(function(r){
      var el=document.getElementById(listId);
      if(r.error){el.innerHTML='<span style="color:#C8443B">'+esc(r.error.message)+'</span>';return;}
      var rows=r.data||[];if(!rows.length){el.innerHTML='まだ登録がありません。';return;}
      var h='<table><tbody>';rows.forEach(function(x){h+='<tr><td>'+esc(x.name)+'</td><td class="ops"><button class="lnk" data-id="'+x.id+'">削除</button></td></tr>';});
      el.innerHTML=h+'</tbody></table>';
      el.querySelectorAll('[data-id]').forEach(function(b){b.onclick=async function(){await sb.from(table).delete().eq('id',b.getAttribute('data-id'));listMaster(table,listId);};});
    });
  }
  function addMaster(table,inputId,listId,msgId){
    var msg=document.getElementById(msgId);msg.textContent='';msg.className='msg';
    var name=val(inputId);if(!name){msg.textContent='名前を入力してください。';msg.className='msg err';return;}
    sb.from(table).insert({shop_id:SHOP,name:name}).then(function(r){
      if(r.error){msg.textContent='追加できませんでした：'+r.error.message;msg.className='msg err';return;}
      setVal(inputId,'');listMaster(table,listId);
    });
  }
  document.getElementById('v_add').onclick=function(){addMaster('vendors','v_name','vendorList','v_msg');};
  document.getElementById('o_add').onclick=function(){addMaster('outsourcers','o_name','outList','o_msg');};

  /* ---------------- 代車登録 ---------------- */
  var FIGS=[['hatchback','ハッチバック'],['sedan','セダン'],['suv','SUV'],['minivan','ミニバン'],['onebox','ワンボックス']];
  var VIEWS=[['front','正面'],['rear','後方'],['left','左側面'],['right','右側面'],['roof','ルーフ']];
  var KINDS=[{id:'kizu',label:'キズ',color:'#E8810C'},{id:'heko',label:'ヘコミ',color:'#C8443B'},{id:'ware',label:'割れ・欠け',color:'#7A3DB8'},{id:'sabi',label:'サビ',color:'#2E9E6B'}];
  var lcKind='kizu', lcEditId=null, lcDamage={front:[],rear:[],left:[],right:[],roof:[]};
  function kindOf(id){for(var i=0;i<KINDS.length;i++){if(KINDS[i].id===id)return KINDS[i];}return KINDS[0];}
  function lcFig(){var e=document.getElementById('lc_fig');return (e&&e.value)||'hatchback';}
  function paintPalette(){document.querySelectorAll('#lc_palette button').forEach(function(b){var on=b.getAttribute('data-k')===lcKind;b.style.outline=on?'2px solid var(--brand)':'none';b.style.fontWeight=on?'700':'500';});}
  function renderViews(){
    var fig=lcFig();var box=document.getElementById('lc_views');if(!box)return;
    box.innerHTML=VIEWS.map(function(v){
      var marks=(lcDamage[v[0]]||[]).map(function(m,i){var k=kindOf(m.k);return '<span class="mk" data-v="'+v[0]+'" data-i="'+i+'" style="left:'+m.x+'%;top:'+m.y+'%;background:'+k.color+'">'+(i+1)+'</span>';}).join('');
      return '<div class="vtile"><div class="vlbl">'+v[1]+'</div><div class="vwrap" data-v="'+v[0]+'"><img src="assets/vehicles/'+fig+'/'+v[0]+'.png" alt="'+v[1]+'">'+marks+'</div></div>';
    }).join('');
    box.querySelectorAll('.vwrap').forEach(function(w){
      w.onclick=function(e){
        if(e.target&&e.target.classList&&e.target.classList.contains('mk'))return;
        var r=w.getBoundingClientRect();if(r.width<1||r.height<1)return;
        var x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100;
        var view=w.getAttribute('data-v');(lcDamage[view]=lcDamage[view]||[]).push({x:Math.round(x*10)/10,y:Math.round(y*10)/10,k:lcKind});renderViews();
      };
    });
    box.querySelectorAll('.mk').forEach(function(m){
      m.onclick=function(e){e.stopPropagation();var v=m.getAttribute('data-v');var i=parseInt(m.getAttribute('data-i'),10);lcDamage[v].splice(i,1);renderViews();};
    });
  }
  function buildLoanUI(){
    var fg=document.getElementById('lc_fig');if(!fg)return;
    fg.innerHTML=FIGS.map(function(f){return '<option value="'+f[0]+'">'+f[1]+'</option>';}).join('');
    document.getElementById('lc_age').innerHTML=['制限なし','21歳以上','26歳以上','30歳以上'].map(function(a){return '<option>'+a+'</option>';}).join('');
    document.getElementById('lc_fuel').innerHTML=['レギュラー','ハイオク','軽油','EV','ハイブリッド'].map(function(a){return '<option>'+a+'</option>';}).join('');
    document.getElementById('lc_palette').innerHTML=KINDS.map(function(k){return '<button type="button" data-k="'+k.id+'" style="border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:.82rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px"><span style="width:12px;height:12px;border-radius:50%;background:'+k.color+';display:inline-block"></span>'+k.label+'</button>';}).join('');
    document.querySelectorAll('#lc_palette button').forEach(function(b){b.onclick=function(){lcKind=b.getAttribute('data-k');paintPalette();};});
    paintPalette();fg.onchange=renderViews;renderViews();
  }
  function lcResetForm(){
    lcEditId=null;lcDamage={front:[],rear:[],left:[],right:[],roof:[]};
    ['lc_car','lc_number','lc_shaken'].forEach(function(id){setVal(id,'');});
    document.getElementById('lc_fig').value='hatchback';document.getElementById('lc_age').selectedIndex=0;document.getElementById('lc_fuel').selectedIndex=0;
    document.getElementById('lc_nav').checked=false;document.getElementById('lc_etc').checked=false;
    document.getElementById('lc_smk_no').checked=false;document.getElementById('lc_smk_ok').checked=false;
    var msg=document.getElementById('lc_msg');if(msg){msg.textContent='';msg.className='msg';}renderViews();
  }
  function editLoan(x){
    lcEditId=x.id;
    setVal('lc_car',x.car);setVal('lc_number',x.number);setVal('lc_shaken',x.shaken);
    document.getElementById('lc_fig').value=x.fig_type||'hatchback';
    document.getElementById('lc_age').value=x.age||'制限なし';
    document.getElementById('lc_fuel').value=x.fuel||'レギュラー';
    var eq=x.equip||{};document.getElementById('lc_nav').checked=!!eq.nav;document.getElementById('lc_etc').checked=!!eq.etc;
    document.getElementById('lc_smk_no').checked=eq.smoke==='no';document.getElementById('lc_smk_ok').checked=eq.smoke==='ok';
    lcDamage={front:[],rear:[],left:[],right:[],roof:[]};if(x.damage){VIEWS.forEach(function(v){lcDamage[v[0]]=(x.damage[v[0]]||[]).slice();});}
    renderViews();
    var msg=document.getElementById('lc_msg');if(msg){msg.textContent='編集中：'+(x.car||'');msg.className='msg';}
    window.scrollTo(0,0);
  }
  async function loadLoanCars(){
    var el=document.getElementById('lc_list');if(!el)return;
    var r=await sb.from('loan_cars').select('*').eq('shop_id',SHOP).order('created_at');
    if(r.error){el.innerHTML='<span style="color:#C8443B">'+esc(r.error.message)+'</span>';return;}
    var rows=r.data||[];if(!rows.length){el.innerHTML='まだ登録がありません。';return;}
    var figmap={};FIGS.forEach(function(f){figmap[f[0]]=f[1];});
    var h='<table><thead><tr><th>車名</th><th>ナンバー</th><th>車種</th><th>車検</th><th>傷</th><th></th></tr></thead><tbody>';
    rows.forEach(function(x){var dc=0;if(x.damage){VIEWS.forEach(function(v){dc+=(x.damage[v[0]]||[]).length;});}
      h+='<tr><td>'+esc(x.car)+'</td><td class="small">'+esc(x.number||'')+'</td><td>'+esc(figmap[x.fig_type]||x.fig_type)+'</td><td class="small">'+esc(x.shaken||'')+'</td><td class="small">'+dc+'箇所</td>'+
      '<td class="ops"><button class="lnk" data-edit="'+x.id+'" style="color:var(--brand)">編集</button> <button class="lnk" data-del="'+x.id+'">削除</button></td></tr>';});
    el.innerHTML=h+'</tbody></table>';
    el.querySelectorAll('[data-del]').forEach(function(b){b.onclick=async function(){if(!confirm('削除しますか？'))return;await sb.from('loan_cars').delete().eq('id',b.getAttribute('data-del'));loadLoanCars();};});
    el.querySelectorAll('[data-edit]').forEach(function(b){b.onclick=function(){var id=b.getAttribute('data-edit');var row=rows.filter(function(x){return x.id===id;})[0];if(row)editLoan(row);};});
  }
  if(document.getElementById('lc_clear'))document.getElementById('lc_clear').onclick=function(){lcDamage={front:[],rear:[],left:[],right:[],roof:[]};renderViews();};
  if(document.getElementById('lc_reset'))document.getElementById('lc_reset').onclick=lcResetForm;
  if(document.getElementById('lc_save'))document.getElementById('lc_save').onclick=async function(){
    var msg=document.getElementById('lc_msg');msg.textContent='';msg.className='msg';
    var car=val('lc_car');if(!car){msg.textContent='車名を入力してください。';msg.className='msg err';return;}
    var equip={nav:document.getElementById('lc_nav').checked,etc:document.getElementById('lc_etc').checked,smoke:document.getElementById('lc_smk_ok').checked?'ok':(document.getElementById('lc_smk_no').checked?'no':'')};
    var row={shop_id:SHOP,car:car,number:val('lc_number'),shaken:val('lc_shaken')||null,fig_type:lcFig(),age:document.getElementById('lc_age').value,fuel:document.getElementById('lc_fuel').value,equip:equip,damage:lcDamage};
    this.disabled=true;this.textContent='保存中…';
    var r=lcEditId?await sb.from('loan_cars').update(row).eq('id',lcEditId):await sb.from('loan_cars').insert(row);
    this.disabled=false;this.textContent='保存';
    if(r.error){msg.textContent='保存できませんでした：'+r.error.message;msg.className='msg err';return;}
    msg.textContent='保存しました。';msg.className='msg ok';lcResetForm();loadLoanCars();
  };

  (async function(){
    var s=await sb.auth.getSession();
    if(!s.data||!s.data.session){location.replace('login.html');return;}
    var uid=s.data.session.user.id;
    var p=await sb.from('profiles').select('role,name,shop_id').eq('id',uid).single();
    if(!p.data||p.data.role!=='shop_admin'){location.replace('home.html');return;}
    SHOP=p.data.shop_id;
    document.getElementById('whoName').textContent=(p.data.name||'店舗管理者')+' さん';
    buildLoanUI();
    loadShop();loadStaff();loadStInvites();listMaster('vendors','vendorList');listMaster('outsourcers','outList');loadLoanCars();
  })();
</script>
</body>
