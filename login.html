<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#d97706">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>ログイン — 入庫カルテ</title>
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--brand:#1F4E74;--brand-deep:#143A57;--amber:#E8810C;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--surface2:#F6F8FA;--red:#C8443B}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand-deep),var(--brand));font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink);padding:20px}
  .card{background:#fff;width:100%;max-width:380px;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:30px 26px}
  .brand{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:6px}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--amber);display:grid;place-items:center;font-weight:800;color:#1b1b1b}
  .brand b{font-size:1.1rem;letter-spacing:.08em}
  h1{text-align:center;font-size:1.15rem;margin:6px 0 20px;color:var(--brand)}
  .f{margin-bottom:14px}
  .f label{display:block;font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .f input{width:100%;padding:12px 13px;border:1px solid var(--line);border-radius:10px;font-size:1rem;font-family:inherit}
  .f input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,78,116,.12)}
  .cf-turnstile{margin:6px 0 16px;display:flex;justify-content:center;min-height:65px}
  button{width:100%;background:var(--brand);color:#fff;border:0;padding:13px;border-radius:11px;font-size:1rem;font-weight:700;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:12px;font-size:.85rem;text-align:center;min-height:1.2em}
  .msg.err{color:var(--red)}
  .msg.ok{color:#1f6b2a}
  .note{margin-top:16px;font-size:.72rem;color:var(--muted);text-align:center;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><span class="logo">入</span><b>入庫カルテ</b></div>
  <h1 id="title">ログイン</h1>
  <div class="f"><label for="email">メールアドレス</label><input id="email" type="email" autocomplete="username"></div>
  <div class="f" id="pwField"><label for="pw">パスワード</label><input id="pw" type="password" autocomplete="current-password"></div>
  <p id="forgotLead" hidden style="font-size:.85rem;color:var(--muted);line-height:1.6;margin:0 0 14px;text-align:center">登録したメールアドレスを入力し、「私はロボットではありません」にチェックして、下のボタンを押してください。パスワード再設定用のリンクをメールでお送りします。</p>
  <div class="cf-turnstile" data-sitekey="0x4AAAAAADoIX0U2L82sEhxt" data-callback="onTok"></div>
  <button id="go">ログイン</button>
  <button id="sendReset" hidden>再設定メールを送信</button>
  <div id="msg" class="msg"></div>
  <div style="text-align:center;margin-top:10px">
    <a href="#" id="toForgot" style="font-size:.8rem;color:var(--brand);text-decoration:none">パスワードを忘れた方はこちら</a>
    <a href="#" id="toLogin" hidden style="font-size:.8rem;color:var(--brand);text-decoration:none">← ログイン画面に戻る</a>
  </div>
  <div class="note">スタッフの方は、店舗から配布されたメール・パスワードでログインしてください。</div>
</div>
<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  var tok='';
  window.onTok=function(t){tok=t;};
  // すでにログイン済みならホームへ
  sb.auth.getSession().then(function(r){if(r.data&&r.data.session)location.replace('home.html');});
  var msg=document.getElementById('msg');
  document.getElementById('go').addEventListener('click',async function(){
    msg.textContent='';msg.className='msg';
    var email=document.getElementById('email').value.trim();
    var password=document.getElementById('pw').value;
    if(!email||!password){msg.textContent='メールとパスワードを入力してください。';msg.className='msg err';return;}
    this.disabled=true;this.textContent='確認中…';
    var opts=tok?{captchaToken:tok}:{};
    var res=await sb.auth.signInWithPassword({email:email,password:password,options:opts});
    if(res.error){
      msg.textContent='ログインできませんでした：'+res.error.message;msg.className='msg err';
      this.disabled=false;this.textContent='ログイン';
      if(window.turnstile)try{turnstile.reset();}catch(e){}tok='';
      return;
    }
    location.replace('home.html');
  });
  // ログイン ⇄ パスワード再設定 の表示切替
  var elTitle=document.getElementById('title');
  var elPwField=document.getElementById('pwField');
  var elLead=document.getElementById('forgotLead');
  var btnGo=document.getElementById('go');
  var btnReset=document.getElementById('sendReset');
  var lnkToForgot=document.getElementById('toForgot');
  var lnkToLogin=document.getElementById('toLogin');
  function showForgot(on){
    msg.textContent='';msg.className='msg';
    elTitle.textContent=on?'パスワード再設定':'ログイン';
    elPwField.hidden=on; elLead.hidden=!on;
    btnGo.hidden=on; btnReset.hidden=!on;
    lnkToForgot.hidden=on; lnkToLogin.hidden=!on;
  }
  lnkToForgot.addEventListener('click',function(e){e.preventDefault();showForgot(true);});
  lnkToLogin.addEventListener('click',function(e){e.preventDefault();showForgot(false);});

  btnReset.addEventListener('click',async function(){
    msg.textContent='';msg.className='msg';
    var email=document.getElementById('email').value.trim();
    if(!email){msg.textContent='メールアドレスを入力してください。';msg.className='msg err';return;}
    var opts={redirectTo:'https://nyukokarte.com/reset.html'};
    if(tok)opts.captchaToken=tok;
    this.disabled=true;this.textContent='送信中…';
    var r=await sb.auth.resetPasswordForEmail(email,opts);
    this.disabled=false;this.textContent='再設定メールを送信';
    if(r.error){
      msg.textContent='送信できませんでした：'+r.error.message+'（「私はロボットではありません」にチェックしてから、もう一度お試しください）';
      msg.className='msg err';
      if(window.turnstile)try{turnstile.reset();}catch(e2){}tok='';
      return;
    }
    msg.textContent='再設定メールを送信しました。届いたメールのリンクから新しいパスワードを設定してください。';
    msg.className='msg ok';
  });
</script>
</body>
</html>
