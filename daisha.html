<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>代車貸出シート — CARCHECK</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/qrcode.js"></script>
<style>
  :root{--paper:#EBEEF2;--surface:#fff;--surface2:#F6F8FA;--ink:#16202B;--muted:#5C6B7A;--line:#D6DEE6;--brand:#1F4E74;--brand-deep:#143A57;--brand-soft:#E7EEF5;--amber:#E8810C;--green:#2E9E6B;--green-soft:#E2F2EA;--red:#C8443B;--purple:#7A3DB8}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic Medium","Noto Sans JP",system-ui,sans-serif;color:var(--ink)}
  .topbar{background:var(--brand-deep);color:#fff;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;border-radius:8px;background:var(--amber);display:grid;place-items:center;font-weight:800;color:#1b1b1b}
  .brand b{letter-spacing:.06em}.brand small{display:block;font-size:.62rem;letter-spacing:.18em;color:#9fb6cc}
  .who{font-size:.82rem;color:#cdd9e6;display:flex;align-items:center;gap:10px}
  .who a,.who button{background:rgba(255,255,255,.12);color:#fff;border:0;padding:7px 12px;border-radius:8px;font-size:.8rem;cursor:pointer;text-decoration:none}
  .wrap{max-width:760px;margin:0 auto;padding:20px 18px 90px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
  .card-l{font-size:.7rem;letter-spacing:.12em;font-weight:700;color:var(--muted);margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:.74rem;color:var(--muted);font-weight:600;margin-bottom:4px}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;font-size:.95rem;font-family:inherit;background:#fff}
  .ro{font-size:.92rem}.ro b{color:var(--ink)}
  .info{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:.9rem}
  .info div span{color:var(--muted);font-size:.8rem;display:block}
  .views{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:10px}
  .vtile{border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff}
  .vlbl{font-size:.7rem;color:var(--muted);font-weight:700;margin-bottom:4px;text-align:center}
  .vwrap{position:relative;width:100%}
  .vwrap img{width:100%;display:block}
  .mk{position:absolute;width:17px;height:17px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.3);display:grid;place-items:center;font-size:.58rem;color:#fff;font-weight:700}
  .seg{display:flex;gap:6px;flex-wrap:wrap}
  .seg button{border:1px solid var(--line);background:#fff;border-radius:9px;padding:9px 14px;font-size:.88rem;font-weight:700;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .terms{height:130px;overflow-y:auto;border:1px solid var(--line);border-radius:9px;padding:10px;background:var(--surface2);font-size:.8rem;white-space:pre-wrap;line-height:1.6}
  .signbox{border:1px solid var(--line);border-radius:10px;background:#fff;overflow:hidden}
  #sign_pad{display:block;width:100%;height:170px;touch-action:none}
  .primary{background:var(--brand);color:#fff;border:0;padding:12px 22px;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer}
  .ghost{background:#fff;color:var(--brand);border:1px solid var(--line);padding:10px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:.88rem}
  .msg{font-size:.84rem;margin-top:10px;min-height:1em}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}
  .small{font-size:.78rem;color:var(--muted)}
  .pick{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:.85rem;background:#fff}
  .actions{display:flex;gap:10px;flex-wrap:wrap}
  /* print */
  #printArea{display:none}
  @media print{
    body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    body > .topbar,body > .wrap{display:none!important}
    #printArea{display:block;padding:0;color:#111}
    #printArea *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .p-title{text-align:center;font-size:18px;font-weight:700;color:#fff;background:#143A57;padding:9px 8px;border-radius:8px;margin-bottom:10px;letter-spacing:.05em}
    .p-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px}
    .p-sec{background:#143A57;color:#fff;font-size:12.5px;font-weight:700;padding:5px 11px;margin:12px 0 6px;border-left:5px solid #E8810C;border-radius:5px}
    table.pt{width:100%;border-collapse:collapse;font-size:12px}
    table.pt th,table.pt td{border:1px solid #999;padding:5px 7px;text-align:left}
    table.pt th{background:#eef2f6;width:22%}
    .pfigs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .pfig{border:1px solid #ccc;border-radius:6px;padding:5px;position:relative}
    .pfig .l{font-size:10px;text-align:center;color:#143A57;font-weight:600}
    .pfig .w{position:relative}.pfig img{width:100%;display:block}
    .pmk{position:absolute;width:15px;height:15px;border-radius:50%;transform:translate(-50%,-50%);border:1px solid #fff;color:#fff;font-size:8px;display:grid;place-items:center;font-weight:700}
    .pterms{font-size:9px;white-space:pre-wrap;line-height:1.5;border:1px solid #ccc;padding:6px;border-radius:4px}
    .psign{display:flex;gap:14px;align-items:flex-end;margin-top:8px}
    .psign .box{flex:1;border:1px solid #999;border-radius:6px;min-height:80px;display:flex;align-items:center;justify-content:center}
    .psign img{max-height:78px}
    .pqr{margin-top:10px;text-align:center}
    .pqr img{width:96px;height:96px;image-rendering:pixelated}
    .pqr div{font-size:9px;color:#444;margin-top:2px}
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="logo">C</span><div><b id="shopName">代車貸出シート</b><small>CARCHECK</small></div></div>
  <div class="who"><span id="whoName"></span><a href="index.html">受付</a><a href="schedule.html">工場</a><button id="out">ログアウト</button></div>
</div>

<div class="wrap">
  <div class="card">
    <div class="card-l">代車を選択</div>
    <div class="field" style="margin:0"><select id="loanSel"><option value="">登録済みの代車から選択</option></select></div>
  </div>

  <div class="card" id="loanInfoCard" style="display:none">
    <div class="card-l">代車情報（登録内容を自動表示）</div>
    <div class="info" id="loanInfo"></div>
    <div class="views" id="loanViews"></div>
  </div>

  <div class="card">
    <div class="card-l">貸出先（お客様）</div>
    <div style="margin-bottom:10px"><button class="ghost" id="loadIntakeBtn">入庫受付シートから読み込む</button><div id="intakePick" style="margin-top:8px"></div></div>
    <div class="grid2">
      <div class="field"><label>お客様名</label><input id="c_name"></div>
      <div class="field"><label>連絡先</label><input id="c_tel"></div>
      <div class="field"><label>預かり車両（お客様の車）</label><input id="c_veh"></div>
      <div class="field"><label>納車予定日</label><input id="c_due" type="date"></div>
      <div class="field"><label>貸出日</label><input id="lend_date" type="date"></div>
      <div class="field"><label>返却予定日</label><input id="return_date" type="date"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-l">代車金額</div>
    <div class="seg" id="amtSeg">
      <button data-a="once">1回</button><button data-a="day">1日</button><button data-a="insurance">保険利用</button><button data-a="free">無料</button>
    </div>
    <div class="field" id="amtField" style="margin-top:10px;display:none"><label>金額（円）</label><input id="amt" inputmode="numeric" placeholder="例：3300"></div>
  </div>

  <div class="card">
    <div class="card-l">利用規約</div>
    <div class="terms" id="termsBox"></div>
  </div>

  <div class="card">
    <div class="card-l">お客様署名</div>
    <div id="signCarried" style="display:none">
      <p class="small" style="margin-top:0">上記同意の上で、入庫チェックシートの署名を反映して利用します。</p>
      <img id="carriedImg" style="max-height:90px;border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px;display:block">
      <label style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:.9rem"><input type="checkbox" id="agreeChk"> 上記に同意します（お客様確認）</label>
      <div style="margin-top:8px"><button class="ghost" id="resignBtn">署名し直す</button></div>
    </div>
    <button class="ghost" id="signStartBtn">署名する</button>
    <div id="signArea" style="display:none">
      <p class="small" style="margin-top:0">上記内容・利用規約に同意のうえ、枠内にご署名ください。</p>
      <div class="signbox"><canvas id="sign_pad"></canvas></div>
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px"><button class="ghost" id="sign_clear">署名をクリア</button><span class="small" id="sign_status">未署名</span></div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="saveBtn">完了</button>
    <button class="ghost" id="pdfBtn">PDF出力</button>
  </div>
  <div class="msg" id="msg"></div>

  <div class="card" id="finalPanel" style="display:none;margin-top:14px;border:2px solid var(--brand)">
    <div class="card-l">最終確認（受付＋代車）</div>
    <div style="font-weight:700;margin-bottom:6px">① 受付チェックシート</div>
    <div id="intakeShare" class="small">—</div>
    <div style="font-weight:700;margin:16px 0 6px">② 代車貸出シート</div>
    <button class="ghost" id="pdfBtn2">代車貸出シートのPDFを出力</button>
    <div class="small" style="margin-top:8px">※ 受付チェックシートのPDFは、上のQRまたは「受付シートを表示」から、お客様の画面で保存できます。</div>
  </div>
</div>

<div id="printArea"></div>

<script>
  var SUPABASE_URL='https://ysxqnwxpuxfstvuobzuz.supabase.co';
  var SB_KEY='sb_publishable_5Wc1cQ4nYDejKaxQt7Clag_BXiVs4DL';
  var sb=window.supabase.createClient(SUPABASE_URL,SB_KEY);
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function val(id){var e=document.getElementById(id);return e?String(e.value).trim():'';}
  function setVal(id,v){var e=document.getElementById(id);if(e)e.value=(v==null?'':v);}

  var FIGS={hatchback:'ハッチバック',sedan:'セダン',suv:'SUV',minivan:'ミニバン',onebox:'ワンボックス'};
  var VIEWS=[['front','正面'],['rear','後方'],['left','左側面'],['right','右側面'],['roof','ルーフ']];
  var KINDS={kizu:{label:'キズ',color:'#E8810C'},heko:{label:'ヘコミ',color:'#C8443B'},ware:{label:'割れ・欠け',color:'#7A3DB8'},sabi:{label:'サビ',color:'#2E9E6B'}};
  var AMT={once:'1回',day:'1日',insurance:'保険利用',free:'無料'};
  var FUELMAP={};
  var TERMS='【代車貸出 利用規約（サンプル）】\n\n1. 貸出車両は当店の所有物です。丁寧な運転と適切な管理をお願いします。\n2. 走行中の事故・違反・駐車違反等は、原則として借受人の責任となります。\n3. 返却時は貸出時と同等の状態（燃料・清掃・装備）でのご返却をお願いします。\n4. 車両に新たな傷・汚損・破損が生じた場合は、別途修理費等をご負担いただくことがあります。\n5. 禁煙車での喫煙、ペットの同乗等はご遠慮ください。\n6. 返却予定日を過ぎる場合は、事前に必ずご連絡ください。\n\n上記の内容に同意のうえ、ご署名ください。\n（本文はサンプルです。実際の規約文に差し替えてください。）';

  var SHOP=null, SHOPINFO={}, LOANS=[], curLoan=null, amtType='', signData='', carriedSign=false, intakeId='';
  function makeQR(text){ if(typeof qrcode==='undefined')return ''; try{var q=qrcode(0,'M');q.addData(text);q.make();return q.createDataURL(5,8);}catch(e){return '';} }

  document.getElementById('out').onclick=function(){sb.auth.signOut().then(function(){location.replace('login.html');});};
  document.getElementById('termsBox').textContent=TERMS;

  function renderViews(host,fig,damage){
    host.innerHTML=VIEWS.map(function(v){
      var marks=((damage||{})[v[0]]||[]).map(function(m,i){var k=KINDS[m.k]||KINDS.kizu;return '<span class="mk" style="left:'+m.x+'%;top:'+m.y+'%;background:'+k.color+'">'+(i+1)+'</span>';}).join('');
      return '<div class="vtile"><div class="vlbl">'+v[1]+'</div><div class="vwrap"><img src="assets/vehicles/'+(fig||'hatchback')+'/'+v[0]+'.png" alt="'+v[1]+'">'+marks+'</div></div>';
    }).join('');
  }
  function eqText(eq){eq=eq||{};var a=[];if(eq.nav)a.push('カーナビ');if(eq.etc)a.push('ETC');if(eq.smoke==='no')a.push('禁煙車');if(eq.smoke==='ok')a.push('喫煙可');return a.join('・')||'—';}
  function showLoan(x){
    curLoan=x;
    document.getElementById('loanInfoCard').style.display='';
    document.getElementById('loanInfo').innerHTML=
      '<div><span>車名</span><b>'+esc(x.car)+'</b></div>'+
      '<div><span>ナンバー</span><b>'+esc(x.number||'—')+'</b></div>'+
      '<div><span>車種</span>'+esc(FIGS[x.fig_type]||x.fig_type)+'</div>'+
      '<div><span>車検期限</span>'+esc(x.shaken||'—')+'</div>'+
      '<div><span>保険対象年齢</span>'+esc(x.age||'—')+'</div>'+
      '<div><span>ガソリン</span>'+esc(x.fuel||'—')+'</div>'+
      '<div style="grid-column:1/-1"><span>装備</span>'+esc(eqText(x.equip))+'</div>';
    renderViews(document.getElementById('loanViews'),x.fig_type,x.damage);
  }
  document.getElementById('loanSel').onchange=function(){
    var x=LOANS.filter(function(l){return l.id===this.value;}.bind(this))[0];
    if(x)showLoan(x);else{curLoan=null;document.getElementById('loanInfoCard').style.display='none';}
  };

  function saveLoanState(){
    try{sessionStorage.setItem('cs_loan_state',JSON.stringify({
      carId:curLoan?curLoan.id:'',c_name:val('c_name'),c_tel:val('c_tel'),c_veh:val('c_veh'),c_due:val('c_due'),
      lend_date:val('lend_date'),return_date:val('return_date'),amtType:amtType,amt:val('amt'),
      signData:signData,carriedSign:carriedSign,agree:(document.getElementById('agreeChk')?document.getElementById('agreeChk').checked:false)
    }));}catch(e){}
  }
  function restoreLoanState(){
    var raw;try{raw=sessionStorage.getItem('cs_loan_state');}catch(e){}
    if(!raw)return;var s;try{s=JSON.parse(raw);}catch(e){return;}
    if(s.carId){var sel=document.getElementById('loanSel');sel.value=s.carId;var x=LOANS.filter(function(l){return l.id===s.carId;})[0];if(x)showLoan(x);}
    setVal('c_name',s.c_name);setVal('c_tel',s.c_tel);setVal('c_veh',s.c_veh);setVal('c_due',s.c_due);
    setVal('lend_date',s.lend_date);setVal('return_date',s.return_date);
    if(s.amtType){var b=document.querySelector('#amtSeg button[data-a="'+s.amtType+'"]');if(b)b.click();setVal('amt',s.amt);}
    if(s.signData){
      signData=s.signData;
      if(s.carriedSign){carriedSign=true;document.getElementById('carriedImg').src=s.signData;document.getElementById('signCarried').style.display='';document.getElementById('signStartBtn').style.display='none';if(s.agree&&document.getElementById('agreeChk'))document.getElementById('agreeChk').checked=true;}
      else{showSignArea();setTimeout(function(){try{var img=new Image();img.onload=function(){signCtx.drawImage(img,0,0,signCv.width,signCv.height);};img.src=s.signData;document.getElementById('sign_status').textContent='署名済み';}catch(e){}},140);}
    }
  }

  document.querySelectorAll('#amtSeg button').forEach(function(b){b.onclick=function(){
    amtType=b.getAttribute('data-a');
    document.querySelectorAll('#amtSeg button').forEach(function(x){x.classList.toggle('on',x===b);});
    document.getElementById('amtField').style.display=(amtType==='once'||amtType==='day')?'':'none';
  };});

  document.getElementById('loadIntakeBtn').onclick=async function(){
    var box=document.getElementById('intakePick');box.innerHTML='読み込み中…';
    var r=await sb.from('sheets').select('id,created_at,data').eq('shop_id',SHOP).order('created_at',{ascending:false}).limit(30);
    if(r.error){box.innerHTML='<span class="small" style="color:#C8443B">'+esc(r.error.message)+'</span>';return;}
    var rows=(r.data||[]).filter(function(x){var d=x.data||{};return d.sheetType==='intake';});
    if(!rows.length){box.innerHTML='<span class="small">入庫受付シートがありません。</span>';return;}
    box.innerHTML=rows.map(function(x){var d=x.data||{};var c=d.cust||{};var dai=(d.daisha==='yes')?'（代車あり）':'';
      return '<div class="pick"><div>'+esc(c.name||'（無名）')+' 様 <span class="small">'+esc(d.vehicleName||'')+' '+dai+'</span></div><button class="ghost" data-iid="'+x.id+'">読み込む</button></div>';}).join('');
    box.querySelectorAll('[data-iid]').forEach(function(b){b.onclick=function(){
      var x=rows.filter(function(r){return r.id===b.getAttribute('data-iid');})[0];if(!x)return;var d=x.data||{};var c=d.cust||{};
      setVal('c_name',c.name||'');setVal('c_tel',c.tel||'');setVal('c_veh',d.vehicleName||'');setVal('c_due',d.intakeDate||'');
      box.innerHTML='<span class="small" style="color:#1d6d49">読み込みました。</span>';
    };});
  };

  /* signature pad */
  var signCv, signCtx, signDirty=false;
  function resizeSign(){ if(!signCv)return; var r=signCv.getBoundingClientRect(); if(r.width<1)return; signCv.width=r.width; signCv.height=170; signCtx.lineWidth=2.2; signCtx.lineCap='round'; signCtx.strokeStyle='#14304a'; }
  function initSignPad(){
    signCv=document.getElementById('sign_pad'); signCtx=signCv.getContext('2d'); var drawing=false;
    function pos(e){var r=signCv.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return {x:t.clientX-r.left,y:t.clientY-r.top};}
    function down(e){drawing=true;var p=pos(e);signCtx.beginPath();signCtx.moveTo(p.x,p.y);e.preventDefault();}
    function move(e){if(!drawing)return;var p=pos(e);signCtx.lineTo(p.x,p.y);signCtx.stroke();signDirty=true;e.preventDefault();}
    function up(){if(!drawing)return;drawing=false;if(signDirty){signData=signCv.toDataURL('image/png');document.getElementById('sign_status').textContent='署名済み';}}
    signCv.addEventListener('mousedown',down);signCv.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
    signCv.addEventListener('touchstart',down,{passive:false});signCv.addEventListener('touchmove',move,{passive:false});signCv.addEventListener('touchend',up);
    document.getElementById('sign_clear').onclick=function(){signCtx.clearRect(0,0,signCv.width,signCv.height);signData='';signDirty=false;document.getElementById('sign_status').textContent='未署名';};
  }
  function showSignArea(){document.getElementById('signStartBtn').style.display='none';document.getElementById('signCarried').style.display='none';document.getElementById('signArea').style.display='';setTimeout(resizeSign,60);}
  initSignPad();
  document.getElementById('signStartBtn').onclick=showSignArea;
  document.getElementById('resignBtn').onclick=function(){signData='';carriedSign=false;showSignArea();};
  window.addEventListener('resize',resizeSign);

  function amountLabel(){if(!amtType)return '';if(amtType==='free')return '無料';if(amtType==='insurance')return '保険利用';return AMT[amtType]+'　'+(val('amt')?'¥'+val('amt'):'');}

  function buildSheetInner(){
    var x=curLoan||{};
    var shopLines='';if(SHOPINFO.company)shopLines+='<div><b>'+esc(SHOPINFO.company)+'</b></div>';
    if(SHOPINFO.tel)shopLines+='<div>TEL：'+esc(SHOPINFO.tel)+'</div>';if(SHOPINFO.address)shopLines+='<div>'+esc(SHOPINFO.address)+'</div>';
    var figs='<div class="pfigs">'+VIEWS.map(function(v){
      var marks=((x.damage||{})[v[0]]||[]).map(function(m,i){var k=KINDS[m.k]||KINDS.kizu;return '<span class="pmk" style="left:'+m.x+'%;top:'+m.y+'%;background:'+k.color+'">'+(i+1)+'</span>';}).join('');
      return '<div class="pfig"><div class="l">'+v[1]+'</div><div class="w"><img src="assets/vehicles/'+(x.fig_type||'hatchback')+'/'+v[0]+'.png">'+marks+'</div></div>';
    }).join('')+'</div>';
    var sigImg=signData?'<img src="'+signData+'">':'';
    var agreed=document.getElementById('agreeChk')&&document.getElementById('agreeChk').checked;
    var signNote=carriedSign?('上記同意の上で、入庫チェックシートの署名を反映して利用します。'+(agreed?'（同意確認済み）':'')):'上記内容・利用規約に同意し、車両をお借りします。';
    var qrUrl=intakeId?(location.origin+'/view.html?id='+encodeURIComponent(intakeId)):'';
    var qrI=qrUrl?makeQR(qrUrl):'';
    var qrSec=qrI?'<div class="pqr"><img src="'+qrI+'"><div>スキャンで受付内容を表示・PDF保存</div></div>':'';
    var html='<div class="p-title">代車貸出チェックシート</div>'+
      '<div class="p-hdr"><div>貸出日：'+esc(val('lend_date')||'____/__/__')+'</div><div>'+shopLines+'</div></div>'+
      '<div class="p-sec">貸出先（お客様）</div>'+
      '<table class="pt"><tr><th>お客様名</th><td>'+(val('c_name')?esc(val('c_name'))+' 様':'')+'</td><th>連絡先</th><td>'+esc(val('c_tel'))+'</td></tr>'+
      '<tr><th>預かり車両</th><td>'+esc(val('c_veh'))+'</td><th>納車予定日</th><td>'+esc(val('c_due'))+'</td></tr>'+
      '<tr><th>貸出日</th><td>'+esc(val('lend_date'))+'</td><th>返却予定日</th><td>'+esc(val('return_date'))+'</td></tr>'+
      '<tr><th>代車金額</th><td colspan="3">'+esc(amountLabel())+'</td></tr></table>'+
      '<div class="p-sec">貸出代車</div>'+
      '<table class="pt"><tr><th>車名</th><td>'+esc(x.car||'')+'</td><th>ナンバー</th><td>'+esc(x.number||'')+'</td></tr>'+
      '<tr><th>車種</th><td>'+esc(FIGS[x.fig_type]||x.fig_type||'')+'</td><th>車検期限</th><td>'+esc(x.shaken||'')+'</td></tr>'+
      '<tr><th>保険対象年齢</th><td>'+esc(x.age||'')+'</td><th>ガソリン</th><td>'+esc(x.fuel||'')+'</td></tr>'+
      '<tr><th>装備</th><td colspan="3">'+esc(eqText(x.equip))+'</td></tr></table>'+
      '<div class="p-sec">代車の状態（傷）</div>'+figs+
      '<div class="p-sec">利用規約</div><div class="pterms">'+esc(TERMS)+'</div>'+
      '<div class="psign"><div style="flex:0 0 auto;font-size:11px">'+signNote+'<br>お客様署名：</div><div class="box">'+sigImg+'</div></div>'+qrSec;
    return html;
  }
  function buildPrint(){ document.getElementById('printArea').innerHTML=buildSheetInner(); }
  function buildLoanDoc(){
    var css='<style>'+
      'body{margin:0;padding:16px;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;color:#111;-webkit-print-color-adjust:exact;print-color-adjust:exact}'+
      '*{-webkit-print-color-adjust:exact;print-color-adjust:exact}'+
      '.p-title{text-align:center;font-size:18px;font-weight:700;color:#fff;background:#143A57;padding:9px 8px;border-radius:8px;margin-bottom:10px;letter-spacing:.05em}'+
      '.p-hdr{display:flex;justify-content:space-between;font-size:12px;margin-bottom:10px}'+
      '.p-sec{background:#143A57;color:#fff;font-size:12.5px;font-weight:700;padding:5px 11px;margin:12px 0 6px;border-left:5px solid #E8810C;border-radius:5px}'+
      'table.pt{width:100%;border-collapse:collapse;font-size:12px}'+
      'table.pt th,table.pt td{border:1px solid #999;padding:5px 7px;text-align:left}'+
      'table.pt th{background:#eef2f6;width:22%}'+
      '.pfigs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}'+
      '.pfig{border:1px solid #ccc;border-radius:6px;padding:5px;position:relative}'+
      '.pfig .l{font-size:10px;text-align:center;color:#143A57;font-weight:600}'+
      '.pfig .w{position:relative}.pfig img{width:100%;display:block}'+
      '.pmk{position:absolute;width:15px;height:15px;border-radius:50%;transform:translate(-50%,-50%);border:1px solid #fff;color:#fff;font-size:8px;display:grid;place-items:center;font-weight:700}'+
      '.pterms{font-size:9px;white-space:pre-wrap;line-height:1.5;border:1px solid #ccc;padding:6px;border-radius:4px}'+
      '.psign{display:flex;gap:14px;align-items:flex-end;margin-top:8px}'+
      '.psign .box{flex:1;border:1px solid #999;border-radius:6px;min-height:80px;display:flex;align-items:center;justify-content:center}'+
      '.psign img{max-height:78px}'+
      '.pqr{margin-top:10px;text-align:center}.pqr img{width:96px;height:96px;image-rendering:pixelated}.pqr div{font-size:9px;color:#444;margin-top:2px}@page{margin:12mm}'+
      '</style>';
    return '<!DOCTYPE html><html><head><meta charset="utf-8"><base href="'+location.origin+'/"><title>代車貸出シート</title>'+css+'</head><body>'+buildSheetInner()+'</body></html>';
  }
  var EMBED=(window.top!==window.self);
  function doLoanPrint(){
    if(!curLoan){var m=document.getElementById('msg');m.textContent='先に代車を選択してください。';m.className='msg err';return;}
    buildPrint();setTimeout(function(){window.print();},150);
  }
  document.getElementById('pdfBtn').onclick=doLoanPrint;
  document.getElementById('pdfBtn2').onclick=doLoanPrint;
  if(EMBED){var _pb=document.getElementById('pdfBtn');if(_pb)_pb.style.display='none';}

  function showFinal(){
    var box=document.getElementById('intakeShare');
    if(window.top!==window.self){
      box.innerHTML='受付チェックシートのPDF・QRは、受付完了画面に表示されています。';
    } else if(intakeId){
      var base=location.origin+location.pathname.replace(/[^/]*$/,'');
      var url=base+'view.html?id='+encodeURIComponent(intakeId);
      var qr=makeQR(url);
      box.innerHTML=(qr?'<img src="'+qr+'" style="width:120px;height:120px;border:1px solid var(--line);image-rendering:pixelated">':'')+
        '<div style="margin-top:8px"><a href="'+url+'" target="_blank" style="display:inline-block;background:#fff;color:var(--brand);border:1px solid var(--line);padding:9px 14px;border-radius:9px;font-weight:700;text-decoration:none">受付シートを表示・PDF</a></div>';
    } else {
      box.innerHTML='この画面を単独で開いたため、受付シートの共有情報はありません。';
    }
    var fp=document.getElementById('finalPanel');fp.style.display='';fp.scrollIntoView({behavior:'smooth'});
  }

  document.getElementById('saveBtn').onclick=async function(){
    var msg=document.getElementById('msg');msg.textContent='';msg.className='msg';
    if(!curLoan){msg.textContent='先に代車を選択してください。';msg.className='msg err';return;}
    if(!val('c_name')){msg.textContent='お客様名を入力してください。';msg.className='msg err';return;}
    if(carriedSign && !document.getElementById('agreeChk').checked){msg.textContent='入庫時の署名を利用する場合は「上記に同意します」にチェックを入れるか、署名し直してください。';msg.className='msg err';return;}
    var row={shop_id:SHOP,loan_car_id:curLoan.id,customer:val('c_name'),cust_vehicle:val('c_veh'),cust_tel:val('c_tel'),
      amount_type:amtType||null,amount:val('amt')||null,lend_date:val('lend_date')||null,return_date:val('return_date')||null,
      sign:signData||null,snapshot:{car:curLoan.car,number:curLoan.number,shaken:curLoan.shaken,fig_type:curLoan.fig_type,equip:curLoan.equip,age:curLoan.age,fuel:curLoan.fuel,damage:curLoan.damage}};
    this.disabled=true;this.textContent='完了処理中…';
    var r=await sb.from('loan_sheets').insert(row);
    this.disabled=false;this.textContent='完了';
    if(r.error){msg.textContent='保存できませんでした：'+r.error.message;msg.className='msg err';return;}
    saveLoanState();
    if(EMBED){
      try{window.parent.postMessage({type:'cs_loan_done',html:buildLoanDoc()},'*');}catch(e){}
      msg.textContent='完了しました。受付完了画面に「代車貸出シートのPDF」を追加しました。';msg.className='msg ok';
    } else {
      msg.textContent='保存しました。下の最終確認から、受付・代車のPDF／QRを出せます。';msg.className='msg ok';
      showFinal();
    }
  };

  (async function(){
    var s=await sb.auth.getSession();
    if(!s.data||!s.data.session){location.replace('login.html');return;}
    var uid=s.data.session.user.id;
    var p=await sb.from('profiles').select('role,name,shop_id').eq('id',uid).single();
    if(!p.data||!p.data.shop_id){location.replace('home.html');return;}
    SHOP=p.data.shop_id;document.getElementById('whoName').textContent=(p.data.name||'')+' さん';
    var sh=await sb.from('shops').select('name,company,address,tel').eq('id',SHOP).single();
    if(sh.data){SHOPINFO=sh.data;document.getElementById('shopName').textContent=sh.data.name||'代車貸出シート';}
    var lc=await sb.from('loan_cars').select('*').eq('shop_id',SHOP).order('created_at');LOANS=(lc.data)||[];
    document.getElementById('loanSel').innerHTML='<option value="">登録済みの代車から選択</option>'+LOANS.map(function(l){return '<option value="'+l.id+'">'+esc(l.car)+(l.number?'（'+esc(l.number)+'）':'')+'</option>';}).join('');
    try{
      var hoRaw=sessionStorage.getItem('cs_loan_handoff');
      if(hoRaw){var ho=JSON.parse(hoRaw);sessionStorage.removeItem('cs_loan_handoff');
        intakeId=ho.intakeId||'';
        setVal('c_name',ho.name);setVal('c_tel',ho.tel);setVal('c_veh',ho.vehicle);setVal('c_due',ho.due);
        var today=new Date();setVal('lend_date',today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2)+'-'+('0'+today.getDate()).slice(-2));
        if(ho.sign){signData=ho.sign;carriedSign=true;document.getElementById('carriedImg').src=ho.sign;document.getElementById('signCarried').style.display='';document.getElementById('signStartBtn').style.display='none';}
        var m=document.getElementById('msg');m.textContent='入庫'+(ho.kind==='business'?'（業者）':'')+'シートから引き継ぎました。代車を選んでPDF出力できます。';m.className='msg ok';
      }
    }catch(e){}
    restoreLoanState();
  })();
</script>
</body>
</html>
